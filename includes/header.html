<!-- Inline script for immediate dropdown functionality -->
<script>
// Immediate mobile dropdown setup
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(function() {
        setupMobileDropdowns();
    }, 100);
});

function setupMobileDropdowns() {
    console.log('Setting up mobile dropdowns...');
    
    const dropdownToggles = document.querySelectorAll('.navbar-nav .dropdown-toggle');
    console.log('Found dropdown toggles:', dropdownToggles.length);
    
    dropdownToggles.forEach((toggle, index) => {
        console.log(`Setting up toggle ${index}:`, toggle.textContent);
        
        // Remove existing listeners
        toggle.replaceWith(toggle.cloneNode(true));
        const newToggle = document.querySelectorAll('.navbar-nav .dropdown-toggle')[index];
        
        newToggle.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            
            console.log('Dropdown clicked:', this.textContent);
            
            // Close other dropdowns
            document.querySelectorAll('.navbar-nav .dropdown-menu').forEach(dropdown => {
                if (dropdown !== this.nextElementSibling) {
                    dropdown.classList.remove('show');
                }
            });
            
            // Toggle current dropdown
            const dropdown = this.nextElementSibling;
            if (dropdown) {
                dropdown.classList.toggle('show');
                console.log('Dropdown toggled:', dropdown.classList.contains('show'));
            }
        });
        
        newToggle.addEventListener('touchstart', function(e) {
            e.preventDefault();
            this.click();
        });
    });
}
</script>
